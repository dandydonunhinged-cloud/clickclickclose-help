services:
  - type: web
    name: clickclickclose-help
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn server:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.12"
      - key: OLLAMA_CLOUD_KEYS
        sync: false
