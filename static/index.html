<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Click Click Close — Ask Anything</title>
  <style>
    :root {
      --bg: #0a0a0f;
      --surface: #12121a;
      --surface2: #1a1a25;
      --border: #2a2a3a;
      --text: #e0e0e8;
      --text-dim: #888899;
      --accent: #6366f1;
      --accent2: #818cf8;
      --green: #22c55e;
      --amber: #f59e0b;
      --cyan: #06b6d4;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    .container {
      max-width: 800px;
      margin: 0 auto;
      padding: 2rem;
    }

    .header {
      text-align: center;
      margin-bottom: 3rem;
      padding: 2rem 0;
    }

    .header h1 {
      font-size: 2.5rem;
      font-weight: 300;
      letter-spacing: 0.3em;
      color: var(--accent2);
      margin-bottom: 0.5rem;
    }

    .header .subtitle {
      color: var(--text-dim);
      font-size: 0.85rem;
      letter-spacing: 0.15em;
    }

    .header .tagline {
      color: var(--cyan);
      font-size: 0.75rem;
      margin-top: 0.5rem;
      letter-spacing: 0.1em;
    }

    .input-section { margin-bottom: 2rem; }

    .query-box {
      display: flex;
      gap: 1rem;
      align-items: stretch;
    }

    .query-input {
      flex: 1;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 1rem 1.25rem;
      color: var(--text);
      font-family: inherit;
      font-size: 1rem;
      outline: none;
      transition: border-color 0.2s;
    }

    .query-input:focus { border-color: var(--accent); }
    .query-input::placeholder { color: var(--text-dim); }

    .run-btn {
      background: var(--accent);
      color: white;
      border: none;
      border-radius: 8px;
      padding: 1rem 2rem;
      font-family: inherit;
      font-size: 0.9rem;
      font-weight: 600;
      letter-spacing: 0.1em;
      cursor: pointer;
      transition: all 0.2s;
      white-space: nowrap;
    }

    .run-btn:hover { background: var(--accent2); }
    .run-btn:disabled { opacity: 0.5; cursor: not-allowed; }

    .status-bar {
      text-align: center;
      padding: 1rem;
      color: var(--text-dim);
      font-size: 0.8rem;
    }

    .status-bar.running { color: var(--amber); }

    .spinner {
      display: inline-block;
      width: 12px;
      height: 12px;
      border: 2px solid var(--border);
      border-top-color: var(--amber);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-right: 0.5rem;
      vertical-align: middle;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .result-card {
      background: var(--surface);
      border: 2px solid var(--accent);
      border-radius: 12px;
      padding: 2rem;
      margin-bottom: 2rem;
      display: none;
    }

    .result-card h2 {
      color: var(--accent2);
      font-size: 1rem;
      letter-spacing: 0.15em;
      margin-bottom: 1rem;
    }

    .result-content {
      font-size: 0.85rem;
      line-height: 1.8;
      color: var(--text);
      white-space: pre-wrap;
    }

    .result-content h1, .result-content h2, .result-content h3 {
      color: var(--accent2);
      margin: 1rem 0 0.5rem;
    }

    .result-content strong { color: var(--text); }
    .result-content em { color: var(--cyan); }

    .progress-bar {
      width: 100%;
      height: 4px;
      background: var(--surface2);
      border-radius: 2px;
      margin-bottom: 1rem;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      background: var(--accent);
      border-radius: 2px;
      transition: width 0.5s ease;
      width: 0%;
    }

    .thinking-box {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 2rem;
      margin-bottom: 2rem;
      display: none;
      text-align: center;
    }

    .thinking-phase {
      font-size: 1.1rem;
      color: var(--accent2);
      margin-bottom: 0.5rem;
      min-height: 1.5em;
      transition: opacity 0.3s;
    }

    .thinking-detail {
      font-size: 0.8rem;
      color: var(--text-dim);
      font-style: italic;
      min-height: 1.2em;
    }

    .thinking-dots {
      margin: 1rem 0;
      display: flex;
      justify-content: center;
      gap: 8px;
    }

    .thinking-dots span {
      width: 8px;
      height: 8px;
      background: var(--accent);
      border-radius: 50%;
      animation: pulse 1.4s ease-in-out infinite;
    }

    .thinking-dots span:nth-child(2) { animation-delay: 0.2s; }
    .thinking-dots span:nth-child(3) { animation-delay: 0.4s; }
    .thinking-dots span:nth-child(4) { animation-delay: 0.6s; }
    .thinking-dots span:nth-child(5) { animation-delay: 0.8s; }

    @keyframes pulse {
      0%, 80%, 100% { opacity: 0.2; transform: scale(0.8); }
      40% { opacity: 1; transform: scale(1.2); }
    }

    .history-section {
      margin-top: 3rem;
      border-top: 1px solid var(--border);
      padding-top: 2rem;
    }

    .history-section h2 {
      color: var(--text-dim);
      font-size: 0.85rem;
      letter-spacing: 0.15em;
      margin-bottom: 1rem;
    }

    .history-item {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 1rem 1.25rem;
      margin-bottom: 0.5rem;
      cursor: pointer;
      transition: border-color 0.2s;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .history-item:hover { border-color: var(--accent); }
    .history-query { font-size: 0.85rem; color: var(--text); flex: 1; }
    .history-meta { font-size: 0.7rem; color: var(--text-dim); text-align: right; margin-left: 1rem; }

    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: var(--surface); }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--text-dim); }
  </style>
</head>
<body>
  <div id="demoBanner" style="display:none; background:#f59e0b; color:#0a0a0f; text-align:center; padding:10px 16px; font-family:sans-serif; font-weight:600; font-size:14px;">
    DEMO MODE — <span id="demoCount">5</span> runs remaining
  </div>
  <div class="container">
    <div class="header">
      <h1>CLICK CLICK CLOSE</h1>
      <div class="subtitle">ASK ANYTHING</div>
      <div class="tagline">5 models debate until they agree. You get the consensus.</div>
    </div>

    <div class="input-section">
      <div class="query-box">
        <input type="text" class="query-input" id="queryInput" placeholder="Ask your question..." autofocus />
        <button class="run-btn" id="runBtn" onclick="startRun()">ASK</button>
      </div>
    </div>

    <div id="statusBar" class="status-bar" style="display:none;"></div>

    <div class="progress-bar" id="progressBar" style="display:none;">
      <div class="progress-fill" id="progressFill"></div>
    </div>

    <div class="thinking-box" id="thinkingBox">
      <div class="thinking-dots"><span></span><span></span><span></span><span></span><span></span></div>
      <div class="thinking-phase" id="thinkingPhase"></div>
      <div class="thinking-detail" id="thinkingDetail"></div>
    </div>

    <div class="result-card" id="resultCard">
      <h2>CONSENSUS</h2>
      <div class="result-content" id="resultContent"></div>
    </div>

    <div class="history-section" id="historySection">
      <h2>PREVIOUS QUESTIONS</h2>
      <div id="historyList"></div>
    </div>
  </div>

  <script>
    const API = window.location.origin;
    const DEMO_KEY = new URLSearchParams(window.location.search).get('key') || '';

    // Show demo banner if using a demo key
    if (DEMO_KEY) {
      document.getElementById('demoBanner').style.display = 'block';
    }

    function updateDemoCount(remaining) {
      const el = document.getElementById('demoCount');
      const banner = document.getElementById('demoBanner');
      if (el) el.textContent = remaining;
      if (remaining <= 0) {
        banner.style.background = '#ef4444';
        banner.innerHTML = 'DEMO EXPIRED — <a href="https://clickclickclose.help" style="color:#fff;text-decoration:underline;">Subscribe for unlimited access</a>';
      }
    }

    function apiFetch(url, opts = {}) {
      if (DEMO_KEY) {
        const sep = url.includes('?') ? '&' : '?';
        url = url + sep + 'key=' + encodeURIComponent(DEMO_KEY);
      }
      return fetch(url, opts);
    }
    let ws = null;
    let passCount = 0;
    const totalPasses = 7;

    const thinkingMessages = [
      { phase: "Examining your question from multiple angles", detail: "Each perspective reveals different assumptions" },
      { phase: "Challenging initial assumptions", detail: "The obvious answer is rarely the complete answer" },
      { phase: "Exploring unconventional possibilities", detail: "What if the constraints themselves are wrong?" },
      { phase: "Expanding the problem space", detail: "Looking for dimensions nobody considered" },
      { phase: "Testing for blind spots", detail: "What are we all missing?" },
      { phase: "Pressure-testing the strongest ideas", detail: "Only the ideas that survive scrutiny make it through" },
      { phase: "Building consensus", detail: "Synthesizing the strongest arguments into one answer" },
    ];

    let thinkingInterval = null;

    function startThinking() {
      const box = document.getElementById('thinkingBox');
      box.style.display = 'block';
      updateThinking(0);
    }

    function updateThinking(index) {
      if (index >= thinkingMessages.length) index = thinkingMessages.length - 1;
      const phase = document.getElementById('thinkingPhase');
      const detail = document.getElementById('thinkingDetail');
      phase.style.opacity = '0';
      detail.style.opacity = '0';
      setTimeout(() => {
        phase.textContent = thinkingMessages[index].phase;
        detail.textContent = thinkingMessages[index].detail;
        phase.style.opacity = '1';
        detail.style.opacity = '1';
      }, 300);
    }

    function stopThinking() {
      document.getElementById('thinkingBox').style.display = 'none';
    }

    window.addEventListener('load', loadHistory);

    document.getElementById('queryInput').addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        startRun();
      }
    });

    async function loadHistory() {
      try {
        const res = await apiFetch(`${API}/api/runs`);
        const runs = await res.json();
        const list = document.getElementById('historyList');
        list.innerHTML = runs.slice(0, 20).map(r => `
          <div class="history-item" onclick="loadRun('${r.id}')">
            <div class="history-query">${escapeHtml(r.query)}</div>
            <div class="history-meta">
              <div>${Math.round(r.duration)}s</div>
            </div>
          </div>
        `).join('');
      } catch (e) {
        console.error('Failed to load history:', e);
      }
    }

    async function loadRun(runId) {
      try {
        const res = await apiFetch(`${API}/api/runs/${runId}`);
        const data = await res.json();
        displayResult(data.final_synthesis || data.collision || 'No consensus reached.');
        document.getElementById('queryInput').value = data.query || '';
      } catch (e) {
        console.error('Failed to load run:', e);
      }
    }

    async function startRun() {
      const input = document.getElementById('queryInput');
      const query = input.value.trim();
      if (!query) return;

      const btn = document.getElementById('runBtn');
      btn.disabled = true;
      btn.textContent = 'THINKING...';
      passCount = 0;

      document.getElementById('resultCard').style.display = 'none';
      document.getElementById('progressBar').style.display = 'block';
      document.getElementById('progressFill').style.width = '0%';
      startThinking();
      showStatus('Analyzing your question...');

      try {
        const res = await apiFetch(`${API}/api/run`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ query, mode: 'cloud' }),
        });
        const runData = await res.json();
        if (!res.ok) {
          showStatus(runData.detail || 'Error starting run');
          btn.disabled = false;
          btn.textContent = 'ASK';
          stopThinking();
          return;
        }
        const { run_id } = runData;
        if (runData.runs_remaining !== undefined) {
          updateDemoCount(runData.runs_remaining);
        }

        const wsUrl = `${API.replace('http', 'ws')}/api/ws/${run_id}`;
        ws = new WebSocket(wsUrl);

        ws.onmessage = (event) => {
          const msg = JSON.parse(event.data);
          handleMessage(msg);
        };

        ws.onclose = () => {
          btn.disabled = false;
          btn.textContent = 'ASK';
          hideStatus();
          document.getElementById('progressBar').style.display = 'none';
          loadHistory();
        };

        ws.onerror = (e) => {
          btn.disabled = false;
          btn.textContent = 'ASK';
          showStatus('Connection error. Please try again.');
        };

      } catch (e) {
        btn.disabled = false;
        btn.textContent = 'ASK';
        showStatus('Failed to connect.');
      }
    }

    function handleMessage(msg) {
      switch (msg.type) {
        case 'status':
          showStatus(msg.message);
          break;

        case 'pass_start':
          passCount++;
          const pct = Math.round((passCount / totalPasses) * 100);
          document.getElementById('progressFill').style.width = pct + '%';
          updateThinking(passCount - 1);
          break;

        case 'pass_complete':
          const pct2 = Math.round((passCount / totalPasses) * 100);
          document.getElementById('progressFill').style.width = pct2 + '%';
          break;

        case 'collision_start':
          document.getElementById('progressFill').style.width = '90%';
          updateThinking(6);
          break;

        case 'collision_complete':
          document.getElementById('progressFill').style.width = '100%';
          stopThinking();
          displayResult(msg.full);
          break;

        case 'complete':
          hideStatus();
          stopThinking();
          break;

        case 'error':
          showStatus('Error: ' + msg.message);
          break;
      }
    }

    function displayResult(text) {
      const card = document.getElementById('resultCard');
      const content = document.getElementById('resultContent');
      card.style.display = 'block';
      content.textContent = text;
    }

    function showStatus(msg) {
      const bar = document.getElementById('statusBar');
      bar.style.display = 'block';
      bar.className = 'status-bar running';
      bar.innerHTML = '<span class="spinner"></span> ' + escapeHtml(msg);
    }

    function hideStatus() {
      document.getElementById('statusBar').style.display = 'none';
    }

    function escapeHtml(str) {
      const div = document.createElement('div');
      div.textContent = str;
      return div.innerHTML;
    }
  </script>
</body>
</html>
